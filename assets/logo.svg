<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
    <defs>
        <!-- Blue to Cyan Gradient -->
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00B4DB;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0083B0;stop-opacity:1" />
        </linearGradient>
        
        <!-- Purple to Cyan Gradient for AI vibe -->
        <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#5EE7FF;stop-opacity:1" />
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Central Brain/Node Hub (AI + Smart City) -->
    <!-- Hexagon Base (City Grid) -->
    <polygon points="250,50 430,150 430,350 250,450 70,350 70,150" fill="none" stroke="url(#grad2)" stroke-width="12" filter="url(#glow)"/>
    
    <!-- Inner Connections (Neural Net / City Nodes) -->
    <path d="M 250,50 L 250,250 M 70,150 L 250,250 M 430,150 L 250,250 M 70,350 L 250,250 M 430,350 L 250,250 M 250,450 L 250,250" stroke="url(#grad1)" stroke-width="6" opacity="0.6"/>
    
    <!-- Nodes -->
    <circle cx="250" cy="50" r="15" fill="#5EE7FF" filter="url(#glow)"/>
    <circle cx="430" cy="150" r="15" fill="#5EE7FF" filter="url(#glow)"/>
    <circle cx="430" cy="350" r="15" fill="#5EE7FF" filter="url(#glow)"/>
    <circle cx="250" cy="450" r="15" fill="#5EE7FF" filter="url(#glow)"/>
    <circle cx="70" cy="350" r="15" fill="#5EE7FF" filter="url(#glow)"/>
    <circle cx="70" cy="150" r="15" fill="#5EE7FF" filter="url(#glow)"/>
    
    <!-- Center Core -->
    <circle cx="250" cy="250" r="45" fill="url(#grad1)" filter="url(#glow)"/>
    <circle cx="250" cy="250" r="25" fill="#FFFFFF"/>
</svg>
